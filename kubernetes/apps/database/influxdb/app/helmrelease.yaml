---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2beta2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: influxdb
  namespace: database
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  interval: 30m

  values:
    controllers:
      influxdb:
        replicas: 1
        containers:
          app:
            image:
              repository: docker.io/influxdb
              tag: 2.9.1-alpine
    service:
      app:
        controller: influxdb
        ports:
          http:
            port: &port 8086

    persistence:
      config:
        enabled: true
        type: nfs
        server: 192.168.1.3
        path: /volume1/network-storage/cluster/influxdb
        globalMounts:
          - path: /var/lib/influxdb
    route:
      main:
        annotations:
          gatus.home-operations.com/endpoint: |
            group: database
            url: http://influxdb-brad.${SECRET_DOMAIN}/ping
            conditions: ["[STATUS] == 204"]
        parentRefs:
          - name: envoy-external
            namespace: network
            sectionName: http
          - name: envoy-external
            namespace: network
            sectionName: https
        hostnames:
          - influxdb-brad.${SECRET_DOMAIN}
        rules:
          - backendRefs:
              - name: influxdb
                port: *port
