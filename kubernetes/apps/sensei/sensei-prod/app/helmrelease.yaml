---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sensei-prod-app
  namespace: sensei
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  interval: 30m
  values:
    controllers:
      sensei-prod-app:
        replicas: 3
        containers:
          app:
            image:
              repository: ghcr.io/clarknova99/project-sensei/frontend
              tag: main-1.0.0@sha256:9c8e606a2c171ea20c0c6db9e8ed7f5aacff5aef583c924a289c50907fe4ed57
              pullPolicy: Always
            env:
              SENSEI_API_KEY: ${SECRET_SENSEI_API_KEY}
              SESSION_SECRET_KEY: ${SECRET_SENSEI_API_KEY}
              API_HOST: sensei-prod-api.sensei.svc.cluster.local
              ENVIRONMENT: production
              GOOGLE_CLIENT_ID: ${SECRET_GOOGLE_CLIENT_ID}
              GOOGLE_CLIENT_SECRET: ${SECRET_GOOGLE_CLIENT_SECRET}
              GOOGLE_REDIRECT_URI: https://www.${SECRET_GOOGLE_REDIRECT_URI}
              STRIPE_PUBLISHABLE_KEY_FRONTEND: ${SECRET_SENSEI_STRIPE_PROD_PUBLISHABLE_KEY}
              STRIPE_WEBHOOK_SIGNING_SECRET: ${SECRET_SENSEI_STRIPE_PROD_WEBHOOK_SIGNING_SECRET}
              PADDLE_PROD_TOKEN: ${SECRET_SENSEI_PADDLE_PROD_TOKEN}
              CLOUDFLARE_TURNSTILE_SITE_KEY: ${SECRET_SENSEI_CLOUDFLARE_TURNSTILE_SITE_KEY}
              ENABLE_REASONING_DISPLAY: "false"
            resources:
              requests:
                memory: 400Mi
                cpu: 10m
              limits:
                memory: 1Gi
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8000
                  initialDelaySeconds: 45
                  periodSeconds: 60
                  timeoutSeconds: 10
                  failureThreshold: 3
                  successThreshold: 1
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8000
                  initialDelaySeconds: 5
                  periodSeconds: 60
                  timeoutSeconds: 20
                  failureThreshold: 3
                  successThreshold: 1
        pod:
          # imagePullPolicy: Always
          imagePullSecrets:
            - name: sensei-secret
    service:
      app:
        controller: sensei-prod-app
        ports:
          http:
            port: &port 8000
    route:
      main:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: "Sensei App"
          gethomepage.dev/icon: mdi-chess-knight-#7C4DFF
          gatus.home-operations.com/endpoint: |
            group: sensei
            url: http://www.${SECRET_DOMAIN_TWO}/health
        parentRefs:
          - name: envoy-external
            namespace: network
            sectionName: https
        hostnames:
          - ${SECRET_DOMAIN_TWO}
          - www.${SECRET_DOMAIN_TWO}
        # rules:
        #   - backendRefs:
        #       - name: sensei-prod-app
        #         port: *port
        #     filters:
        #       - type: RequestHeaderModifier
        #         requestHeaderModifier:
        #           set:
        #             - name: X-Forwarded-Proto
        #               value: https
        #     sessionPersistence:
        #       sessionName: SENSEI_AFFINITY
        #       type: Cookie
        #       absoluteTimeout: 1800s
        #       cookieConfig:
        #         lifetimeType: Permanent
        rules:
          # Cacheable game pages — no session affinity so Cloudflare can cache
          # - matches:
          #     - path:
          #         type: PathPrefix
          #         value: /games/
          #   backendRefs:
          #     - name: sensei-prod-app
          #       port: *port
          #   filters:
          #     - type: RequestHeaderModifier
          #       requestHeaderModifier:
          #         set:
          #           - name: X-Forwarded-Proto
          #             value: https
          # Everything else — sticky sessions as before
          - backendRefs:
              - name: sensei-prod-app
                port: *port
            filters:
              - type: RequestHeaderModifier
                requestHeaderModifier:
                  set:
                    - name: X-Forwarded-Proto
                      value: https
            sessionPersistence:
              sessionName: SENSEI_AFFINITY
              type: Cookie
              absoluteTimeout: 1800s
              cookieConfig:
                lifetimeType: Permanent
