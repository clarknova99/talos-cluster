---
# Headless services with the naming convention chalice's health check expects:
# http://{service}-openreplay.{POD_NAMESPACE}.svc.cluster.local:8888/{path}
# Port 8888 is the Prometheus metrics / health port exposed by each Go service.
apiVersion: v1
kind: Service
metadata:
  name: sink-openreplay
  namespace: sensei
spec:
  selector:
    app.kubernetes.io/controller: sink
    app.kubernetes.io/instance: openreplay
  ports:
    - port: 8888
      targetPort: 8888
