---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app temps
  namespace: sensei
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  interval: 30m

  values:
    controllers:
      # In-pod TimescaleDB. temps requires the TimescaleDB extension (it
      # creates hypertables for analytics), so the cluster's plain CNPG
      # postgres can't be reused. WAL-G archiving is intentionally NOT
      # configured here — backups are handled by the cluster's storage
      # snapshot strategy / VolSync.
      temps-postgres:
        type: statefulset
        replicas: 1
        strategy: RollingUpdate
        statefulset:
          podManagementPolicy: OrderedReady
        pod:
          terminationGracePeriodSeconds: 60
        containers:
          app:
            image:
              repository: gotempsh/timescaledb-walg
              tag: pg18
            env:
              POSTGRES_DB: temps
              POSTGRES_USER: temps
              POSTGRES_PASSWORD: ${SECRET_PGADMIN_PASSWORD}
              TIMESCALEDB_TELEMETRY: "off"
              POSTGRES_HOST_AUTH_METHOD: md5
              PGDATA: /var/lib/postgresql/data/pgdata
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command: ["pg_isready", "-U", "temps"]
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command: ["pg_isready", "-U", "temps"]
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              startup:
                enabled: true
                custom: true
                spec:
                  exec:
                    command: ["pg_isready", "-U", "temps"]
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 30
            resources:
              requests:
                cpu: 50m
                memory: 512Mi
              limits:
                memory: 2Gi

      temps:
        replicas: 1
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          # Docker-in-Docker sidecar. Declared as a Kubernetes native
          # sidecar (init container with restartPolicy: Always, k8s
          # 1.28+), so:
          #   1. dockerd starts during the pod init phase, BEFORE the
          #      maxmind-download init container and the temps app.
          #   2. The startup probe (docker info) gates subsequent init
          #      containers and the main app on dockerd being ready —
          #      ensuring the temps Console API's one-shot Docker check
          #      at startup succeeds.
          #   3. The sidecar stays running for the lifetime of the pod.
          #
          # Privileged is required: dockerd needs to manage cgroups,
          # mount overlay filesystems, and create network namespaces.
          #
          # Storage for /var/lib/docker is on emptyDir — preview
          # containers and their images are ephemeral and rebuilt on
          # pod restart. Swap to a PVC if persistence is needed.
          dind:
            image:
              repository: docker
              tag: 27-dind
            args:
              - --host=unix:///dind-socket/docker.sock
            env:
              DOCKER_TLS_CERTDIR: ""
            restartPolicy: Always
            securityContext:
              privileged: true
            probes:
              startup:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - docker
                      - -H
                      - unix:///dind-socket/docker.sock
                      - info
                  initialDelaySeconds: 5
                  periodSeconds: 3
                  timeoutSeconds: 5
                  failureThreshold: 30
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - docker
                      - -H
                      - unix:///dind-socket/docker.sock
                      - info
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 5
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 2Gi
          # The temps binary loads /app/GeoLite2-City.mmdb at startup and
          # fails fatally if the file is absent. We download a fresh copy
          # into an emptyDir volume each time the pod starts; the file
          # is then surfaced to the app container via a subPath mount.
          maxmind-download:
            image:
              repository: alpine
              tag: "3.24"
            command:
              - sh
              - -c
              - |
                set -eu
                apk add --no-cache curl tar >/dev/null
                tmp="$(mktemp -d)"
                cd "$tmp"
                curl -fsSL \
                  "https://download.maxmind.com/app/geoip_download?edition_id=GeoLite2-City&license_key=$${MAXMIND_LICENSE_KEY}&suffix=tar.gz" \
                  -o gl.tgz
                tar -xzf gl.tgz
                cp GeoLite2-City_*/GeoLite2-City.mmdb /geodata/GeoLite2-City.mmdb
                chmod 644 /geodata/GeoLite2-City.mmdb
                ls -lh /geodata/GeoLite2-City.mmdb
            env:
              MAXMIND_ACCOUNT_ID: ${SECRET_MAXMIND_ACCOUNT_ID}
              MAXMIND_LICENSE_KEY:
                valueFrom:
                  secretKeyRef:
                    name: temps-maxmind
                    key: license_key
        containers:
          app:
            image:
              # Built and pushed by ./build-image.sh in this folder. Bump
              # the tag when a new release is built.
              repository: ghcr.io/clarknova99/temps
              tag: 0.1.0-beta.34
            # The temps binary is a multi-subcommand CLI; `serve` starts
            # the HTTP API + UI. Without args the binary exits non-zero
            # with "requires a subcommand" and CrashLoops.
            args: ["serve"]
            env:
              # Database — points at the in-pod TimescaleDB above. The
              # service name is templated as <release>-<service-key>, so
              # the postgres service ends up as temps-postgres.
              TEMPS_DATABASE_URL: postgresql://temps:${SECRET_PGADMIN_PASSWORD}@temps-postgres.sensei.svc.cluster.local:5432/temps

              # Cluster-wide Dragonfly (Redis-compatible). DB index 15 is
              # reserved for temps.
              REDIS_URL: redis://dragonfly.database.svc.cluster.local:6379/15

              # Server bindings (matches docker-compose defaults).
              TEMPS_ADDRESS: 0.0.0.0:3000
              TEMPS_TLS_ADDRESS: 0.0.0.0:3443
              TEMPS_CONSOLE_ADDRESS: 0.0.0.0:9000

              TEMPS_DATA_DIR: /app/data
              TEMPS_LOG_LEVEL: info

              # Anonymous telemetry off — this is a private, self-hosted
              # deployment.
              TEMPS_TELEMETRY: "0"

              # Used by the geo plugin for GeoLite2 updates.
              MAXMIND_ACCOUNT_ID: ${SECRET_MAXMIND_ACCOUNT_ID}
              MAXMIND_LICENSE_KEY:
                valueFrom:
                  secretKeyRef:
                    name: temps-maxmind
                    key: license_key

              # Public URL — used in emails, links, redirects.
              TEMPS_PUBLIC_URL: https://temps.${SECRET_DOMAIN_TWO}

              # Points temps at the dind sidecar's docker socket. The
              # socket is on a shared emptyDir mounted at /dind-socket
              # in both this container and the dind sidecar.
              DOCKER_HOST: unix:///dind-socket/docker.sock
            probes:
              # temps' proxy on :3000 has no built-in /health endpoint
              # (it forwards /health to the Console API on :9000, which
              # is intentionally disabled here because Docker is not
              # available in-cluster). Use TCP socket probes against the
              # proxy port instead.
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 3000
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 3000
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              startup:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 3000
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 30
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 1Gi

    defaultPodOptions:
      securityContext:
        fsGroup: 1001
        fsGroupChangePolicy: OnRootMismatch
        # GID 2375 is the `docker` group inside the docker:27-dind image
        # \u2014 the dind sidecar creates /dind-socket/docker.sock with
        # ownership root:2375 and mode 0660. Adding it as a supplemental
        # group lets the temps container (uid 1001) talk to dockerd
        # without running as root.
        supplementalGroups:
          - 2375
      imagePullSecrets:
        - name: sensei-secret

    service:
      app:
        controller: temps
        ports:
          http:
            port: 3000
          console:
            port: 9000
      postgres:
        controller: temps-postgres
        ports:
          postgres:
            port: 5432

    route:
      main:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: "Sensei Services"
          gethomepage.dev/icon: https://temps.sh/favicon.ico
          gatus.home-operations.com/endpoint: |
            group: sensei
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        hostnames:
          - temps.${SECRET_DOMAIN_TWO}
        rules:
          - backendRefs:
              - kind: Service
                name: temps-app
                port: 3000

    persistence:
      postgres-data:
        existingClaim: temps-postgres-data
        advancedMounts:
          temps-postgres:
            app:
              - path: /var/lib/postgresql/data
      app-data:
        existingClaim: temps-data
        advancedMounts:
          temps:
            app:
              - path: /app/data
      # In-memory volume populated by the maxmind-download initContainer
      # and surfaced to the app via subPath at /app/GeoLite2-City.mmdb.
      geodata:
        type: emptyDir
        advancedMounts:
          temps:
            maxmind-download:
              - path: /geodata
            app:
              - path: /app/GeoLite2-City.mmdb
                subPath: GeoLite2-City.mmdb
                readOnly: true
      # Shared between the dind sidecar (where dockerd creates the
      # socket) and the temps app container (which connects to it via
      # DOCKER_HOST=unix:///dind-socket/docker.sock).
      dind-socket:
        type: emptyDir
        advancedMounts:
          temps:
            dind:
              - path: /dind-socket
            app:
              - path: /dind-socket
      # dockerd's graph storage (images, layers, container rootfs,
      # volumes). Ephemeral — preview environments are rebuilt on each
      # pod restart.
      dind-storage:
        type: emptyDir
        advancedMounts:
          temps:
            dind:
              - path: /var/lib/docker
