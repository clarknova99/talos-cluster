---
apiVersion: v1
kind: Secret
metadata:
  name: dittofeed-dev-clickhouse-volsync-secret
stringData:
  KOPIA_PASSWORD: ${VOLSYNC_KOPIA_PASSWORD}
  KOPIA_FS_PATH: /repository
  KOPIA_REPOSITORY: "filesystem:///repository"
---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: dittofeed-dev-clickhouse
spec:
  sourcePVC: dittofeed-dev-clickhouse
  trigger:
    schedule: "0 3 * * *"
  kopia:
    compression: zstd-fastest
    copyMethod: Direct
    parallelism: 2
    repository: dittofeed-dev-clickhouse-volsync-secret
    retain:
      daily: 7
    storageClassName: openebs-hostpath
    moverSecurityContext:
      runAsUser: 0
      runAsGroup: 0
      fsGroup: 0
    accessModes: ["ReadWriteOnce"]
