---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2beta2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: langfuse-v3
  namespace: sensei
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      interval: 15m
  maxHistory: 3
  install:
    remediation:
      retries: 5
  upgrade:
    remediation:
      retries: 5
  values:
    controllers:
      langfuse-v3:
        replicas: 1
        containers:
          web:
            image:
              repository: ghcr.io/langfuse/langfuse
              tag: 3.167.4@sha256:d94976edcc2e376f9306aea1186e3944f2fb8670b7d19f5e2ff3d1dabb00f416
            env: &sharedEnv
              DATABASE_URL: postgres://${SECRET_PGADMIN_USER}:${SECRET_PGADMIN_PASSWORD}@postgres-lb-vector.database.svc.cluster.local:5432/langfuse
              SALT: ${SECRET_LANGFUSE_SALT}
              ENCRYPTION_KEY: ${SECRET_LANGFUSE_ENCRYPTION_KEY}
              CLICKHOUSE_URL: http://clickhouse.database.svc.cluster.local:8123
              CLICKHOUSE_MIGRATION_URL: clickhouse://clickhouse.database.svc.cluster.local:9000
              CLICKHOUSE_USER: ${SECRET_CLICKHOUSE_USER}
              CLICKHOUSE_PASSWORD: ${SECRET_CLICKHOUSE_PASSWORD}
              CLICKHOUSE_CLUSTER_ENABLED: false
              REDIS_CONNECTION_STRING: redis://redis.database.svc.cluster.local:6379/1
              LANGFUSE_S3_BATCH_EXPORT_ENABLED: true
              LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse-sensei-backup
              LANGFUSE_S3_EVENT_UPLOAD_PREFIX: langfuse-prod/events/
              LANGFUSE_S3_EVENT_UPLOAD_REGION: ${SECRET_SENSEI_AWS_S3_REGION}
              LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: ${SECRET_SENSEI_AWS_ACCESS_KEY_ID}
              LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${SECRET_SENSEI_AWS_SECRET_ACCESS_KEY}
              LANGFUSE_S3_BATCH_EXPORT_BUCKET: langfuse-sensei-backup
              LANGFUSE_S3_BATCH_EXPORT_PREFIX: langfuse-prod/batch-export/
              LANGFUSE_S3_BATCH_EXPORT_REGION: ${SECRET_SENSEI_AWS_S3_REGION}
              LANGFUSE_S3_BATCH_EXPORT_ACCESS_KEY_ID: ${SECRET_SENSEI_AWS_ACCESS_KEY_ID}
              LANGFUSE_S3_BATCH_EXPORT_SECRET_ACCESS_KEY: ${SECRET_SENSEI_AWS_SECRET_ACCESS_KEY}
              LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: langfuse-sensei-backup
              LANGFUSE_S3_MEDIA_UPLOAD_PREFIX: langfuse-prod/media/
              LANGFUSE_S3_MEDIA_UPLOAD_REGION: ${SECRET_SENSEI_AWS_S3_REGION}
              LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: ${SECRET_SENSEI_AWS_ACCESS_KEY_ID}
              LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: ${SECRET_SENSEI_AWS_SECRET_ACCESS_KEY}
              # web-only vars
              NEXTAUTH_URL: https://langfuse.${SECRET_DOMAIN_TWO}
              NEXTAUTH_SECRET: ${SECRET_LANGFUSE_SECRET}
              HOSTNAME: 0.0.0.0
              AUTH_CUSTOM_CLIENT_ID: langfuse3
              AUTH_CUSTOM_CLIENT_SECRET: ${SECRET_OAUTH_CLIENT_SECRET}
              AUTH_CUSTOM_SCOPE: openid profile email groups
              AUTH_CUSTOM_NAME: authelia
              AUTH_CUSTOM_ISSUER: https://auth.${SECRET_DOMAIN}
              AUTH_CUSTOM_CHECKS: state
              AUTH_CUSTOM_ALLOW_ACCOUNT_LINKING: true
          worker:
            image:
              repository: ghcr.io/langfuse/langfuse-worker
              tag: 3.167.4@sha256:27ed9bc506e218b5a8e527465375d58de8c274e55d7cadb77477d551223b3e8a
            env:
              <<: *sharedEnv
    service:
      web:
        controller: langfuse-v3
        type: LoadBalancer
        annotations:
          # external-dns.alpha.kubernetes.io/hostname: langfuse.${SECRET_DOMAIN_TWO}
          io.cilium/lb-ipam-ips: 192.168.3.32
        ports:
          http:
            port: &port 3000
      worker:
        controller: langfuse-v3
        ports:
          http:
            port: 3030
    route:
      main:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: "Sensei Services"
          gethomepage.dev/icon: openai.svg
          gatus.home-operations.com/endpoint: |
            group: sensei
        parentRefs:
          - name: envoy-external
            namespace: network
            sectionName: https
        hostnames:
          - langfuse.${SECRET_DOMAIN_TWO}
        rules:
          - backendRefs:
              - name: langfuse-v3-web
                port: *port
