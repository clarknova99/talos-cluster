---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kite
  namespace: default
spec:
  chartRef:
    kind: OCIRepository
    name: kite
  interval: 30m

  values:
    controllers:
      kite:
        replicas: 1
        strategy: RollingUpdate

        annotations:
          reloader.stakater.com/auto: "true"

        containers:
          app:
            image:
              repository: ghcr.io/kite-org/kite
              tag: v0.10.0
            env:
              KITE_USERNAME: ${SECRET_CAM_USERNAME}
              KITE_PASSWORD: ${SECRET_CAM_PASSWORD}
              HOST: https://kite.${SECRET_DOMAIN}
              KUBECONFIG: /config/kubeconfig
              ENABLE_ANALYTICS: true
              DB_TYPE: postgres
              DB_DSN: postgresql://${SECRET_PGADMIN_USER}:${SECRET_PGADMIN_PASSWORD}@postgres16-rw.database.svc.cluster.local:5432/kite
              DEBUG: true
              ANONYMOUS_USER_ENABLED: true
            resources:
              requests:
                cpu: 5m
                memory: 128Mi
              limits:
                memory: 256Mi

    service:
      app:
        ports:
          http:
            port: 8080
    route:
      main:
        annotations:
          external-dns.alpha.kubernetes.io/target: external.${SECRET_DOMAIN}
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Infra
          gethomepage.dev/icon: kubernetes-dashboard.svg
          gatus.home-operations.com/endpoint: |
            group: observability
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        hostnames:
          - kite.${SECRET_DOMAIN}
    persistence:
      config:
        enabled: true
        type: nfs
        server: 192.168.1.3
        path: /volume1/network-storage/cluster/kite
        globalMounts:
          - path: /config
