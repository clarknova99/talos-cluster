---
# Test NFS server for developing/testing an NFS client.
# Reachable on the LAN at nfs://192.168.3.36 (see LoadBalancer Service below).
#
# The CephNFS server is GitOps-managed here, but the EXPORTS (shares) are
# created imperatively via the Rook toolbox and stored in Ceph/RADOS, NOT git.
# They persist across pod restarts but are not recreated if the NFS cluster is
# wiped. To (re)create the three test shares:
#
#   for i in 1 2 3; do
#     kubectl -n rook-ceph exec deploy/rook-ceph-tools -- \
#       ceph fs subvolume create ceph-filesystem share$i --namespace-isolated
#     path=$(kubectl -n rook-ceph exec deploy/rook-ceph-tools -- \
#       ceph fs subvolume getpath ceph-filesystem share$i)
#     kubectl -n rook-ceph exec deploy/rook-ceph-tools -- \
#       ceph nfs export create cephfs nfs-test /share$i ceph-filesystem --path="$path"
#   done
#
# List exports:  kubectl -n rook-ceph exec deploy/rook-ceph-tools -- ceph nfs export ls nfs-test
# Client mount:  mount -t nfs -o vers=4.1 192.168.3.36:/share1 /mnt/share1
#
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/ceph.rook.io/cephnfs_v1.json
apiVersion: ceph.rook.io/v1
kind: CephNFS
metadata:
  name: nfs-test
  namespace: rook-ceph
spec:
  # Number of active Ganesha servers. 1 is fine for a test server.
  server:
    active: 1
    logLevel: NIV_INFO
# ---
# Rook creates a ClusterIP Service (rook-ceph-nfs-nfs-test-a) for the Ganesha
# server. We add our own LoadBalancer Service so the NFS client can reach it
# from the LAN at a stable IP. The selector targets Rook's Ganesha pod labels.
---
apiVersion: v1
kind: Service
metadata:
  name: nfs-test-lb
  namespace: rook-ceph
  annotations:
    io.cilium/lb-ipam-ips: 192.168.3.36
spec:
  type: LoadBalancer
  selector:
    app: rook-ceph-nfs
    ceph_nfs: nfs-test
  ports:
    - name: nfs
      port: 2049
      targetPort: 2049
      protocol: TCP
