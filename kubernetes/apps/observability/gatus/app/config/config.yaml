---
web:
  port: 80
storage:
  type: postgres
  path: postgres://${SECRET_PGADMIN_USER}:${SECRET_PGADMIN_PASSWORD}@postgres16-rw.database.svc.cluster.local:5432/gatus?sslmode=disable
  caching: true
metrics: true
ui:
  title: service status
  header: service status
alerting:
  discord:
    webhook-url: ${SECRET_SENSEI_DISCORD_WEBHOOK}
    default-alert:
      description: healthcheck failed
      send-on-resolved: true
      failure-threshold: 3
      success-threshold: 5
endpoints:
  - name: cloudflare
    group: connectivity
    url: "https://1.1.1.1"
    interval: 1m
    conditions:
      - "[STATUS] == 200"

  - name: clickhouse
    group: database
    url: "tcp://clickhouse.database.svc.cluster.local:8123"
    interval: 1m
    conditions:
      - "[CONNECTED] == true"

  - name: clickhouse-rybbit
    group: database
    url: "tcp://rybbit-clickhouse.sensei.svc.cluster.local:8123"
    interval: 1m
    conditions:
      - "[CONNECTED] == true"

  - name: clickhouse-dittofeed
    group: database
    url: "tcp://dittofeed-clickhouse.sensei.svc.cluster.local:8123"
    interval: 1m
    conditions:
      - "[CONNECTED] == true"

  - name: dragonfly
    group: database
    url: "tcp://dragonfly.database.svc.cluster.local:6379"
    interval: 1m
    ui:
      hide-hostname: true
      hide-url: true
    conditions:
      - "[CONNECTED] == true"

  - name: sensei backend
    group: sensei
    url: "tcp://sensei-prod-api.sensei.svc.cluster.local:3001"
    interval: 1m
    ui:
      hide-hostname: true
      hide-url: true
    conditions:
      - "[CONNECTED] == true"
    alerts:
      - type: discord
        description: "healthcheck failed"
        send-on-resolved: true

  - name: postgresql16
    group: database
    url: "tcp://postgres16-rw.database.svc.cluster.local:5432"
    interval: 1m
    ui:
      hide-hostname: true
      hide-url: true
    conditions:
      - "[CONNECTED] == true"

  - name: postgresql16vector
    group: database
    url: "tcp://postgres16vector-rw.database.svc.cluster.local:5432"
    interval: 1m
    ui:
      hide-hostname: true
      hide-url: true
    conditions:
      - "[CONNECTED] == true"
    # alerts:
    #   - type: discord
    #     description: "healthcheck failed"
    #     send-on-resolved: true

  - name: redis
    group: database
    url: "tcp://redis.database.svc.cluster.local:6379"
    interval: 1m
    ui:
      hide-hostname: true
      hide-url: true
    conditions:
      - "[CONNECTED] == true"

  - name: dittofeed-compute-properties
    group: sensei
    url: "http://dittofeed-clickhouse.sensei.svc.cluster.local:8123/?user=dittofeed&password=${SECRET_CLICKHOUSE_PASSWORD}"
    method: POST
    body: |
      SELECT concat(
        if((SELECT max(processed_at) FROM dittofeed.processed_computed_properties_v2) > now() - INTERVAL 60 MINUTE, 'ok', 'stale'),
        ' | last_processed=',
        (SELECT toString(max(processed_at)) FROM dittofeed.processed_computed_properties_v2),
        ' | processed_last_5_min=',
        toString((SELECT count() FROM dittofeed.computed_property_assignments_v2 WHERE assigned_at > now() - INTERVAL 5 MINUTE))
      )
    interval: 5m
    ui:
      hide-hostname: true
      hide-url: true
    conditions:
      - "[STATUS] == 200"
      - "[BODY] == pat(ok*)"
    alerts:
      - type: discord
        description: "dittofeed compute properties stale (>60 min)"
        send-on-resolved: true
        failure-threshold: 1
        success-threshold: 1
