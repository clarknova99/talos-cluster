---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2beta2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: invidious-server
  namespace: media
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  interval: 30m

  values:
    controllers:
      invidious-server:
        strategy: RollingUpdate
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-db:
            image:
              repository: ghcr.io/onedr0p/postgres-init
              tag: 17.4
            envFrom: &envFrom
              - secretRef:
                  name: invidious-secrets
        containers:
          app:
            image:
              repository: quay.io/invidious/invidious
              tag: latest@sha256:7099e3077ecce323497841cd95a981359e72736fcd3365582badbc8e9b3d1783
            envFrom: *envFrom
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
    service:
      app:
        controller: invidious-server
        ports:
          http:
            port: 3000
    route:
      main:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Media
          gethomepage.dev/icon: mdi-youtube
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        hostnames:
          - invidious.${SECRET_DOMAIN}

